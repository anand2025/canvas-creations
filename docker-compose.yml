services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  back-end:
    build: ./back-end
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/canvas_creations
      - JWT_SECRET=your_jwt_secret_here
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - back-end

volumes:
  mongodb_data:
